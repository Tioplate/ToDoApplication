version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: todo-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: todo_application
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      # 自动执行初始化 SQL (需确保 createtable.sql 中没有 USE 外部库的语句)
      - ./createtable.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7-alpine
    container_name: todo-redis
    ports:
      - "6379:6379"

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: todo-backend
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/todo_application?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Tokyo&allowPublicKeyRetrieval=true&useSSL=false
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379
      - CORS_ALLOWED_ORIGINS=http://localhost,http://127.0.0.1
    ports:
      - "8080:8080"
    depends_on:
      - db
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: todo-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:
